name: 自动搜刮直播源

on:
  schedule:
    # 每天 UTC 时间 2:00 / 14:00 运行（北京时间 10:00 / 22:00）
    - cron: '0 2,14 * * *'
  workflow_dispatch:      # 支持手动触发
  push:
    branches: [main, master]

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 缓存频道数据库
        uses: actions/cache@v4
        with:
          path: data/channels.db
          key: channels-db-${{ runner.os }}
          restore-keys: |
            channels-db-${{ runner.os }}

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行搜刮
        run: python main.py --scrape

      - name: 提交更新到仓库
        run: |
          git config user.name "iptv-scraper[bot]"
          git config user.email "iptv-scraper[bot]@users.noreply.github.com"
          git add -A
          # 只在有变更时提交
          git diff --staged --quiet || git commit -m "🔄 自动搜刮更新 $(date +'%Y-%m-%d %H:%M')"
          # 注意: channels.db 通过 actions/cache 持久化, 不提交到 Git
          git reset HEAD data/channels.db
          git push
