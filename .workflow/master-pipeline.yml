version: '1.0'
name: master-pipeline
displayName: 自动搜刮直播源
stages:
  - stage:
    name: scrape
    displayName: 执行搜刮并提交
    steps:
      - step: build@python
        name: run_all
        displayName: 安装依赖 + 执行搜刮 + 提交推送
        pythonVersion: '3.10'
        commands:
          - python3 -m pip install --upgrade pip
          - pip3 config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          - pip3 install -r requirements.txt
          - python3 main.py --scrape
          - git config user.name "iptv-scraper[bot]"
          - git config user.email "iptv-scraper[bot]@users.noreply.github.com"
          - git add -A
          - git diff --staged --quiet || git commit -m "🔄 自动搜刮更新 $(date +'%Y-%m-%d %H:%M')"
          - git push

triggers:
  push:
    branches:
      include:
        - master
        - main
