version: '1.0'
name: auto-scrape
displayName: 自动搜刮直播源
stages:
  - stage:
    name: scrape
    displayName: 执行搜刮
    steps:
      - step: build@python
        name: install_deps
        displayName: 安装依赖
        pythonVersion: '3.10'
        commands:
          - pip install --upgrade pip
          - pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple/

      - step: build@python
        name: run_scrape
        displayName: 执行搜刮
        pythonVersion: '3.10'
        commands:
          - python main.py --scrape

  - stage:
    name: commit
    displayName: 提交更新
    steps:
      - step: script
        name: commit_push
        displayName: 提交并推送到仓库
        commands:
          - git config user.name "iptv-scraper[bot]"
          - git config user.email "iptv-scraper[bot]@users.noreply.github.com"
          - git add -A
          - git diff --staged --quiet || git commit -m "🔄 自动搜刮更新 $(date +'%Y-%m-%d %H:%M')"
          - git push

triggers:
  push:
    branches:
      include:
        - main
        - master
  schedule:
    - cron: '0 2,14 * * *'
      branch: main
    # 每天 UTC 2:00 / 14:00（北京时间 10:00 / 22:00）
